services:
  - type: web
    name: virtual-dad
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # User must provide this in Render dashboard
    disk:
      name: dad-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
